<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>J.A.R.V.I.S.</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:radial-gradient(ellipse at 50% 0%,#0a1628,#030712);
  color:#e0f2fe;
  display:flex;flex-direction:column;
}
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(6,182,212,.03) 2px,rgba(6,182,212,.03) 4px);
  pointer-events:none;z-index:999;
}

/* fullscreen */
body.fullscreen .top-bar{display:none}
body.fullscreen .input-area{display:none}
body.fullscreen .chat-area{padding-bottom:20px}
body.fullscreen .fs-toggle{display:flex}

.fs-toggle{
  display:none;position:fixed;top:16px;right:16px;z-index:1000;
  background:rgba(30,41,59,.6);backdrop-filter:blur(10px);border:1px solid rgba(6,182,212,.2);
  color:#67e8f9;width:40px;height:40px;border-radius:50%;cursor:pointer;
  align-items:center;justify-content:center;font-size:18px;transition:all .3s;
}
.fs-toggle:hover{border-color:#06b6d4}

/* top bar */
.top-bar{
  position:relative;z-index:10;
  padding:12px 24px;display:flex;align-items:center;gap:14px;
  border-bottom:1px solid rgba(6,182,212,.15);
  background:rgba(3,7,18,.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.arc-reactor{width:36px;height:36px;border-radius:50%;position:relative;flex-shrink:0;
  background:radial-gradient(circle at 30% 30%,rgba(6,182,212,.4),rgba(2,132,199,.1) 60%,transparent 80%);
  box-shadow:0 0 20px rgba(6,182,212,.3),inset 0 0 15px rgba(6,182,212,.1);
}
.arc-reactor::before{content:'';position:absolute;inset:4px;border-radius:50%;border:1.5px solid rgba(6,182,212,.5);box-shadow:inset 0 0 8px rgba(6,182,212,.2)}
.arc-reactor::after{content:'';position:absolute;inset:8px;border-radius:50%;
  background:radial-gradient(circle,rgba(103,232,249,.8) 0%,rgba(6,182,212,.3) 40%,transparent 70%);
  animation:pulse-reactor 2s ease-in-out infinite}
@keyframes pulse-reactor{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.15);opacity:1}}
.top-bar .title{font-size:18px;font-weight:600;letter-spacing:2px;
  background:linear-gradient(135deg,#67e8f9,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-bar .subtitle{font-size:11px;color:#5b8ba0;letter-spacing:3px;text-transform:uppercase}
.top-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
.top-actions button{background:rgba(30,41,59,.5);border:1px solid rgba(6,182,212,.2);color:#67e8f9;width:36px;height:36px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .3s}
.top-actions button:hover{border-color:#06b6d4}
.top-actions button.active{background:rgba(6,182,212,.15);border-color:#06b6d4}
.status-badge{font-size:11px;padding:4px 12px;border-radius:100px;border:1px solid rgba(6,182,212,.2);background:rgba(6,182,212,.05);color:#67e8f9;letter-spacing:1px;text-transform:uppercase;transition:all .3s}
.status-badge.listening{background:rgba(34,197,94,.12);border-color:#22c55e;color:#4ade80;box-shadow:0 0 12px rgba(34,197,94,.15)}
.status-badge.speaking{background:rgba(6,182,212,.15);border-color:#67e8f9;color:#67e8f9;box-shadow:0 0 20px rgba(6,182,212,.2)}
.status-badge.thinking{background:rgba(234,179,8,.12);border-color:#eab308;color:#facc15;box-shadow:0 0 12px rgba(234,179,8,.15)}
.connection-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:6px;background:#4ade80;transition:background .2s}
.connection-dot.off{background:#f87171}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(30,41,59,.9);color:#e0f2fe;padding:10px 18px;border-radius:8px;font-size:13px;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* settings panel */
.settings-panel{
  position:fixed;top:0;right:-360px;width:340px;height:100%;z-index:100;
  background:rgba(3,7,18,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-left:1px solid rgba(6,182,212,.15);
  padding:24px;transition:right .35s ease;overflow-y:auto;
}
.settings-panel.open{right:0}
.settings-panel h3{font-size:14px;color:#67e8f9;margin-bottom:16px;letter-spacing:2px;text-transform:uppercase}
.settings-panel label{display:block;font-size:12px;color:#94a3b8;margin-bottom:4px;margin-top:16px}
.settings-panel select,.settings-panel input[type="range"],.settings-panel input[type="text"]{
  width:100%;padding:8px 12px;border-radius:8px;
  background:rgba(30,41,59,.5);border:1px solid rgba(6,182,212,.15);
  color:#e0f2fe;font-size:13px;outline:none;
}
.settings-panel select:focus,.settings-panel input:focus{border-color:rgba(6,182,212,.4)}
.settings-panel .toggle-row{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.settings-panel .toggle-row label{margin:0}
.settings-panel .toggle{padding:6px 14px;border-radius:6px;background:rgba(30,41,59,.5);border:1px solid rgba(6,182,212,.15);color:#67e8f9;cursor:pointer;font-size:12px;transition:all .3s}
.settings-panel .toggle.on{background:rgba(6,182,212,.15);border-color:#06b6d4}
.settings-panel .api-key{background:rgba(30,41,59,.3);border:1px solid rgba(6,182,212,.1);color:#5b8ba0;padding:8px 12px;border-radius:8px;font-size:11px;word-break:break-all;margin-top:4px;font-family:monospace}
.settings-overlay{position:fixed;inset:0;z-index:101;background:transparent;display:none}
.settings-overlay.show{display:block}

/* chat */
.chat-area{flex:1;overflow-y:auto;padding:20px 24px;scroll-behavior:smooth;position:relative;z-index:1}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-track{background:transparent}
.chat-area::-webkit-scrollbar-thumb{background:rgba(6,182,212,.2);border-radius:4px}
.msg{max-width:80%;margin-bottom:16px;animation:fade-up .3s ease-out}
@keyframes fade-up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.msg.user{margin-left:auto}
.msg.jarvis{margin-right:auto}
.msg .bubble{padding:12px 18px;border-radius:16px;font-size:14px;line-height:1.6;position:relative}
.msg.user .bubble{background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.2);border-bottom-right-radius:4px}
.msg.jarvis .bubble{background:rgba(30,41,59,.5);border:1px solid rgba(148,163,184,.12);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom-left-radius:4px}
.msg .label{font-size:10px;color:#5b8ba0;margin-bottom:4px;letter-spacing:1px}
.msg.user .label{text-align:right}

/* thinking indicator */
.thinking-dots{display:flex;gap:6px;padding:8px 0}
.thinking-dots span{
  width:8px;height:8px;border-radius:50%;
  background:#06b6d4;animation:bounce 1.4s ease-in-out infinite;
}
.thinking-dots span:nth-child(2){animation-delay:.16s}
.thinking-dots span:nth-child(3){animation-delay:.32s}
@keyframes bounce{
  0%,80%,100%{transform:scale(.6);opacity:.3}
  40%{transform:scale(1);opacity:1}
}

/* input area */
.input-area{
  padding:16px 24px;border-top:1px solid rgba(6,182,212,.1);
  background:rgba(3,7,18,.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.input-row{display:flex;gap:12px;align-items:flex-end;max-width:900px;margin:0 auto;width:100%}
.input-row textarea{
  flex:1;resize:none;padding:12px 18px;border-radius:12px;
  background:rgba(30,41,59,.4);border:1px solid rgba(6,182,212,.15);
  color:#e0f2fe;font-size:14px;font-family:inherit;
  outline:none;transition:border-color .3s;line-height:1.5;
}
.input-row textarea:focus{border-color:rgba(6,182,212,.4)}
.input-row textarea::placeholder{color:#3b6375}
.btn{
  width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .3s;font-size:18px;
}
.file-drop-zone{
  padding:12px 18px;
  border-radius:12px;
  background:rgba(30,41,59,.4);
  border:1px dashed rgba(6,182,212,.15);
  margin-bottom:12px;
  text-align:center;
  color:#94a3b8;
  font-size:14px;
  transition:all .2s;
  user-select:none;
}
.file-drop-zone.dragover{
  border-style:solid;
  background:rgba(6,182,212,.1);
  color:#67e8f9;
}
.btn-send{background:linear-gradient(135deg,#06b6d4,#0891b2);color:#fff}
.btn-send:hover{box-shadow:0 0 20px rgba(6,182,212,.3);transform:scale(1.05)}
.btn-send:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-mic{background:rgba(30,41,59,.5);border:1px solid rgba(6,182,212,.2);color:#67e8f9}
.btn-mic:hover{border-color:#06b6d4;box-shadow:0 0 12px rgba(6,182,212,.1)}
.btn-mic.recording{background:rgba(239,68,68,.15);border-color:#ef4444;color:#ef4444;box-shadow:0 0 20px rgba(239,68,68,.15)}

/* arc reactor center animation */
.center-ring{
  position:fixed;top:50%;left:50%;translate:-50% -50%;
  width:80vmin;height:80vmin;border-radius:50%;
  background:radial-gradient(circle at 50% 50%,
    rgba(6,182,212,.01) 0%,
    rgba(6,182,212,.005) 30%,
    transparent 60%);
  pointer-events:none;z-index:0;
  transition:opacity .5s;
}
.center-ring.active{
  background:radial-gradient(circle at 50% 50%,
    rgba(6,182,212,.04) 0%,
    rgba(6,182,212,.015) 25%,
    transparent 55%);
}
.ring-pulse{
  position:fixed;top:50%;left:50%;translate:-50% -50%;
  width:60vmin;height:60vmin;border-radius:50%;
  border:1px solid rgba(6,182,212,.05);
  pointer-events:none;z-index:0;
  animation:ring-expand 3s ease-out infinite;
}
@keyframes ring-expand{
  0%{transform:translate(-50%,-50%) scale(.8);opacity:.5}
  100%{transform:translate(-50%,-50%) scale(1.6);opacity:0}
}

/* voice visualizer */
.viz-container{
  position:fixed;bottom:90px;left:50%;translate:-50%;
  display:flex;align-items:flex-end;gap:4px;height:60px;
  pointer-events:none;z-index:1;opacity:0;transition:opacity .3s;
}
.viz-container.active{opacity:1;}
.viz-bar{
  width:4px;border-radius:2px;background:#06b6d4;
  transition:height .08s ease;
}

/* voice waveform ring */
.wave-ring{
  position:fixed;top:50%;left:50%;translate:-50% -50%;
  width:200px;height:200px;border-radius:50%;
  pointer-events:none;z-index:0;
  opacity:0;transition:opacity .5s;
}
.wave-ring.active{opacity:1;}
.wave-ring .ring{
  position:absolute;inset:0;border-radius:50%;
  border:1.5px solid rgba(6,182,212,.15);
  animation:wave-expand 2s ease-out infinite;
}
.wave-ring .ring:nth-child(2){animation-delay:.5s}
.wave-ring .ring:nth-child(3){animation-delay:1s}
@keyframes wave-expand{
  0%{transform:scale(.9);opacity:.6}
  100%{transform:scale(1.4);opacity:0}
}

/* clear chat btn */
.clear-btn{position:absolute;bottom:20px;left:50%;translate:-50%;padding:6px 16px;border-radius:100px;background:rgba(30,41,59,.3);border:1px solid rgba(148,163,184,.1);color:#5b8ba0;font-size:11px;cursor:pointer;transition:all .3s;z-index:5;letter-spacing:1px;text-transform:uppercase}
.clear-btn:hover{color:#e0f2fe;border-color:rgba(6,182,212,.2)}
/* markdown */
.bubble code{background:rgba(6,182,212,.1);padding:2px 6px;border-radius:4px;font-size:13px}
.bubble pre{background:rgba(0,0,0,.3);padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0}
.bubble pre code{background:none;padding:0}
.bubble ul,.bubble ol{padding-left:20px;margin:4px 0}
.bubble p{margin:4px 0}
.bubble a{color:#67e8f9}
.bubble h1,.bubble h2,.bubble h3{color:#67e8f9;margin:8px 0 4px}
.bubble hr{border:none;border-top:1px solid rgba(6,182,212,.15);margin:8px 0}
.bubble blockquote{border-left:2px solid rgba(6,182,212,.3);margin:4px 0;padding:2px 12px;color:#94a3b8}
/* stats panel */
.stats-panel{position:fixed;top:0;left:-340px;width:320px;height:100%;z-index:100;
  background:rgba(3,7,18,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-right:1px solid rgba(6,182,212,.15);padding:24px;transition:left .35s ease;overflow-y:auto}
.stats-panel.open{left:0}
.stats-panel h3{font-size:14px;color:#67e8f9;margin-bottom:16px;letter-spacing:2px;text-transform:uppercase}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(6,182,212,.06)}
.stat-label{color:#94a3b8;font-size:12px}
.stat-value{color:#e0f2fe;font-size:13px;font-family:monospace}
.stat-value.good{color:#4ade80}
.stat-value.warn{color:#facc15}
.stat-value.bad{color:#f87171}
.stat-sectitle{color:#5b8ba0;font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-top:16px;margin-bottom:8px}
</style>
</head>
<body>
<div class="hud-container"><canvas id="hudCanvas" width="800" height="800" style="position:fixed;top:50%;left:50%;translate:-50% -50%;pointer-events:none;z-index:-1;"></canvas></div>

<div class="center-ring" id="centerRing"></div>
<div class="ring-pulse" style="animation-delay:0s"></div>
<div class="ring-pulse" style="animation-delay:1.5s"></div>
<div class="wave-ring" id="waveRing"><div class="ring"></div><div class="ring"></div><div class="ring"></div></div>
<div class="viz-container" id="vizContainer"></div>

<div class="top-bar">
  <div class="arc-reactor"></div>
  <div>
    <div class="title">J.A.R.V.I.S.</div>
    <div class="subtitle">Just A Rather Very Intelligent System</div>
  </div>
  <div class="top-actions">
    <span class="status-badge" id="statusBadge">standby</span>
    <span id="connectionDot" class="connection-dot off"></span>
    <button id="fsBtn" title="Fullscreen">⛶</button>
    <button id="statsBtn" title="System Status">📊</button>
    <button id="settingsBtn" title="Settings">⚙</button>
  </div>
</div>
<button class="fs-toggle" id="fsExitBtn">⛶</button>

<div class="settings-overlay" id="settingsOverlay"></div>
<div class="settings-panel" id="settingsPanel">
  <h3>⚙ Settings</h3>

  <label>Server URL</label>
    <input type="text" id="serverUrl" value="http://192.168.55.43:8642" placeholder="http://<server-ip>:8642">

  <label>Metrics URL</label>
    <input type="text" id="metricsUrl" value="http://192.168.55.43:8643/system" placeholder="http://<server-ip>:8643/system">

  <label>API Endpoint</label>
    <input type="text" id="apiEndpoint" value="http://192.168.55.43:8642/v1/chat/completions">

  <label>API Key</label>
  <div class="api-key" id="apiKeyDisplay">••••••••</div>

  <label>Model</label>
  <select id="modelSelect">
    <option value="auto">auto</option>
    <option value="qwen3-coder-480b">qwen3-coder-480b</option>
  </select>

  <label>TTS Voice</label>
  <select id="voiceSelect"><option value="">Default</option></select>

  <label>TTS Rate</label>
  <input type="range" id="ttsRate" min="0.5" max="2" step="0.1" value="1.05">

  <label>TTS Pitch</label>
  <input type="range" id="ttsPitch" min="0.5" max="1.5" step="0.1" value="0.9">

  <div class="toggle-row">
    <label>Auto-speak replies</label>
    <div class="toggle on" id="ttsToggle">ON</div>
  </div>

  <div class="toggle-row">
    <label>Always-on listening</label>
    <div class="toggle" id="alwaysListen">OFF</div>
  </div>

  <div class="toggle-row">
    <label>Fullscreen on start</label>
    <div class="toggle" id="autoFs">OFF</div>
  </div>

  <label style="margin-top:24px">Shortcuts</label>
  <div style="color:#5b8ba0;font-size:11px;line-height:1.8;margin-top:4px">
    <b>Enter</b> — send<br>
    <b>Shift+Enter</b> — newline<br>
    <b>Space (listening)</b> — stop mic<br>
    <b>Esc</b> — close settings
  </div>
</div>

<div class="stats-panel" id="statsPanel">
  <h3>📊 System Status</h3>
  <div id="statsContent">Loading...</div>
</div>

<div class="chat-area" id="chatArea"></div>
<button class="clear-btn" id="clearBtn">Clear Chat</button>

<div class="input-area">
  <div class="file-drop-zone" id="fileDropZone">Drop file here</div>
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Type a message..." maxlength="4000"></textarea>
    <button class="btn btn-mic" id="micBtn" title="Voice input">🎤</button>
    <button class="btn btn-send" id="sendBtn" title="Send">➤</button>
  </div>
</div>

<script>
// ── state ──
const STATE={IDLE:'standby',LISTENING:'listening',THINKING:'thinking',SPEAKING:'speaking'};
let state=STATE.IDLE,isRecording=false,synth=window.speechSynthesis,recognition=null;
let isSpeaking=false,alwaysListening=false,autoFs=false,ttsEnabled=true;

let messages=[{role:"system",content:"You are J.A.R.V.I.S., Tony Stark's AI assistant. Respond with calm, British-tinged professionalism. Be helpful, witty when appropriate, but always precise. Keep responses concise and conversational."}];

// settings
const API_KEY='0b0765631d437f1806e1046fe437f2ae41363904cc6ee161cfaae3c7b640e77d';
const SETTINGS_KEY='jarvis_settings';

function getBaseUrl(){
  const u=document.getElementById('serverUrl').value.replace(/\/+$/,'');
  return u||'http://127.0.0.1:8642';
}
function updateApiEndpointFromServer(){
  const base=getBaseUrl();
  document.getElementById('apiEndpoint').value=base+'/v1/chat/completions';
}
document.getElementById('serverUrl').addEventListener('input',updateApiEndpointFromServer);

function loadSettings(){
  try{
    const s=JSON.parse(localStorage.getItem(SETTINGS_KEY));
    if(s){
      document.getElementById('serverUrl').value=s.serverUrl||'http://192.168.55.43:8642';
      document.getElementById('metricsUrl').value=s.metricsUrl||'http://192.168.55.43:8643/system';
      updateApiEndpointFromServer();
      document.getElementById('modelSelect').value=s.model||'auto';
      document.getElementById('ttsRate').value=s.ttsRate||1.05;
      document.getElementById('ttsPitch').value=s.ttsPitch||0.9;
      ttsEnabled=s.ttsEnabled!==false;
      alwaysListening=!!s.alwaysListen;
      autoFs=!!s.autoFs;
      document.getElementById('ttsToggle').textContent=ttsEnabled?'ON':'OFF';
      document.getElementById('ttsToggle').classList.toggle('on',ttsEnabled);
      document.getElementById('alwaysListen').textContent=alwaysListening?'ON':'OFF';
      document.getElementById('alwaysListen').classList.toggle('on',alwaysListening);
      document.getElementById('autoFs').textContent=autoFs?'ON':'OFF';
      document.getElementById('autoFs').classList.toggle('on',autoFs);
    }
  }catch(e){}
}
function saveSettings(){
  localStorage.setItem(SETTINGS_KEY,JSON.stringify({
    serverUrl:document.getElementById('serverUrl').value,
    metricsUrl:document.getElementById('metricsUrl').value,
    endpoint:document.getElementById('apiEndpoint').value,
    model:document.getElementById('modelSelect').value,
    ttsRate:parseFloat(document.getElementById('ttsRate').value),
    ttsPitch:parseFloat(document.getElementById('ttsPitch').value),
    ttsEnabled,alwaysListening,autoFs
  }));
}

// ── DOM ──
const chat=document.getElementById('chatArea');
const input=document.getElementById('input');
const sendBtn=document.getElementById('sendBtn');
const micBtn=document.getElementById('micBtn');
const statusEl=document.getElementById('statusBadge');
const centerRing=document.getElementById('centerRing');
const waveRing=document.getElementById('waveRing');
const viz=document.getElementById('vizContainer');
const statsPanel=document.getElementById('statsPanel');
const statsBtn=document.getElementById('statsBtn');
const settingsPanel=document.getElementById('settingsPanel');
const settingsOverlay=document.getElementById('settingsOverlay');
const settingsBtn=document.getElementById('settingsBtn');
const fsBtn=document.getElementById('fsBtn');
const fsExitBtn=document.getElementById('fsExitBtn');
const clearBtn=document.getElementById('clearBtn');

// ── viz bars ──
for(let i=0;i<40;i++){const b=document.createElement('div');b.className='viz-bar';viz.appendChild(b)}
const bars=viz.querySelectorAll('.viz-bar');

// ── textarea ──
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px'});
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});

// ── status ──
function setStatus(s){
  state=s;
  let {symbol, color} = getStatusSymbol(s, true);
  statusEl.innerHTML = `<span style="color: ${color}">${symbol}</span> ${s}`;
  if(s===STATE.THINKING)statusEl.classList.add('thinking');
  if(s===STATE.LISTENING)statusEl.classList.add('listening');
  if(s===STATE.SPEAKING)statusEl.classList.add('speaking');
  centerRing.classList.toggle('active',s===STATE.LISTENING||s===STATE.SPEAKING);
  waveRing.classList.toggle('active',s===STATE.LISTENING);
  viz.classList.toggle('active',s===STATE.LISTENING);
  if(s!==STATE.LISTENING)animateViz(0);
}

function getStatusSymbol(state, blink) {
  switch (state) {
    case STATE.LISTENING:
      return { symbol: blink ? '●' : '○', color: '#4ade80' };
    case STATE.SPEAKING:
      return { symbol: '●', color: '#ff6b00' };
    case STATE.THINKING:
      return { symbol: blink ? '◈' : '◇', color: '#facc15' };
    case 'PROCESSING':
      return { symbol: blink ? '▷' : '▶', color: '#facc15' };
    default:
      return { symbol: blink ? '●' : '○', color: '#67e8f9' };
  }
}

let lastConnectionStatus = null;
let blink = true;
let blinkInterval = null;

// Initialize blinking for status symbol
function initBlink() {
  blinkInterval = setInterval(() => {
    blink = !blink;
    if (state && statusEl && getStatusSymbol) {
      const {symbol, color} = getStatusSymbol(state, blink);
      const current = statusEl.innerHTML;
      if (current.includes('LISTENING') || current.includes('THINKING') || current.includes('PROCESSING') || current.includes('SPEAKING')) {
        statusEl.innerHTML = `<span style="color: ${color}">${symbol}</span> ${state}`;
      }
    }
  }, 500);
}
initBlink();

function updateConnectionStatus(isOnline) {
  if (lastConnectionStatus === isOnline) return; // no change
  const wasInitial = lastConnectionStatus === null;
  lastConnectionStatus = isOnline;
  const dot = document.getElementById('connectionDot');
  if (dot) {
    dot.className = 'connection-dot' + (isOnline ? '' : ' off');
  }
  // Show toast only if not the initial load
  if (!wasInitial) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = isOnline ? 'Connected to server' : 'Disconnected from server';
    document.body.appendChild(toast);
    // Trigger reflow to enable transition
    void toast.offsetWidth;
    toast.classList.add('show');
    // Remove after 2 seconds
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 300); // match transition delay
    }, 2000);
  }
}

// Initialize connection status as offline (without toast)
updateConnectionStatus(false);

function animateViz(level){
  if(state!==STATE.LISTENING){bars.forEach(b=>b.style.height='2px');return}
  const h=Math.min(60,Math.max(2,level*1.2+2));
  bars.forEach(b=>b.style.height=(h*(.3+Math.random()*.7))+'px');
}

function scrollChat(){requestAnimationFrame(()=>{chat.scrollTop=chat.scrollHeight})}

// ── messages ──
function addMsg(role,text){
  const div=document.createElement('div');

  else bubble.innerHTML=marked.parse(text);

}
let thinkingEl=null;
function showThinking(){
  if(thinkingEl)return;
  const div=document.createElement('div');
  div.className='msg jarvis';
  div.id='thinking-msg';
  const label=document.createElement('div');
  label.className='label';

function hideThinking(){if(thinkingEl){thinkingEl.remove();thinkingEl=null}}

// ── API call (streaming) ──
async function callHermes(msgs, onChunk){
  const endpoint=document.getElementById('apiEndpoint').value;
  const model=document.getElementById('modelSelect').value;
  const res=await fetch(endpoint,{
    method:'POST',
    mode:'cors',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},
    body:JSON.stringify({model,messages:msgs,max_tokens:4096,temperature:.7,stream:true})
  });
  updateConnectionStatus(true);
  if(!res.ok){const t=await res.text();throw new Error(`API ${res.status}: ${t.slice(0,200)}`)}
  const reader=res.body.getReader();
  const dec=new TextDecoder();
  let full='', buf='';
  while(true){
    const{done,value}=await reader.read();
    if(done)break;
    buf+=dec.decode(value,{stream:true});
    const lines=buf.split('\n');
    buf=lines.pop()||'';
    for(const line of lines){
      if(!line.startsWith('data: '))continue;
      const data=line.slice(6);
      if(data==='[DONE]')continue;
      try{
        const j=JSON.parse(data);
        const d=j.choices?.[0]?.delta?.content||'';
        if(d){full+=d;onChunk(d,full)}
      }catch(e){/* skip */}
    }
  }
  return full;
}

// ── TTS ──
function speak(text,cb){
  console.log('speak called with text:', text);
  if(!synth){
    console.error('SpeechSynthesis not supported');
    if(cb)cb();
    return;
  }
  if(!ttsEnabled){
    console.log('TTS disabled');
    if(cb)cb();
    return;
  }
  if(!text.trim()){
    console.log('Empty text, not speaking');
    if(cb)cb();
    return;
  }
  synth.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=parseFloat(document.getElementById('ttsRate').value);
  u.pitch=parseFloat(document.getElementById('ttsPitch').value);
  const sel=document.getElementById('voiceSelect').value;
  if(sel){
    const v=synth.getVoices().find(v=>v.name===sel);
    if(v){
      u.voice=v;
      console.log('Using voice:', v.name);
    }else{
      console.warn('Voice not found:', sel, 'using default');
    }
  }else{
    console.log('No voice selected, using default');
  }
  // Ensure voices are loaded; if not, wait a bit and retry
  if(synth.getVoices().length===0){
    console.log('Waiting for voices to load...');
    setTimeout(()=>speak(text,cb),100);
    return;
  }
  let started=false;
  u.onstart=()=>{started=true;isSpeaking=true;setStatus(STATE.SPEAKING);console.log('Speech started');};
  u.onend=()=>{isSpeaking=false;setStatus(STATE.IDLE);console.log('Speech ended');if(cb)cb();};
  u.onerror=(e)=>{isSpeaking=false;setStatus(STATE.IDLE);console.error('Speech synthesis error:', e);if(cb)cb();};
  synth.speak(u);
  // safety timeout
  setTimeout(()=>{if(!started&&state===STATE.SPEAKING)setStatus(STATE.IDLE);console.log('Speech timeout fallback');},100);
}

// ── send (streaming) ──
async function send(){
  const text=input.value.trim();
  if(!text||state===STATE.THINKING)return;
  input.value='';input.style.height='auto';
  addMsg('user',text);
  messages.push({role:'user',content:text});
  setStatus(STATE.THINKING);
  showThinking();
  sendBtn.disabled=true;
  const streamId='streamBubble';
  let sb=document.getElementById(streamId);
  if(sb)sb.remove();
  const div=document.createElement('div');
  div.className='msg jarvis';div.id=streamId;
  div.innerHTML='<div class="label">J.A.R.V.I.S.</div><div class="bubble"></div>';
  chat.appendChild(div);scrollChat();
  let fullReply='';
  try{
    fullReply=await callHermes(messages,(delta,full)=>{
      hideThinking();
      sb=document.getElementById(streamId);
      if(sb)sb.querySelector('.bubble').innerHTML=marked.parse(full);
      scrollChat();
    });
    sb=document.getElementById(streamId);
    if(sb)sb.id='';
    hideThinking();
    messages.push({role:'assistant',content:fullReply});
    saveMessages();
    setStatus(STATE.IDLE);
    speak(fullReply);
  }catch(e){
    console.error('API error:',e);
    updateConnectionStatus(false);
    hideThinking();
    setStatus(STATE.IDLE);
    sb=document.getElementById(streamId);
    if(sb)sb.remove();
    const msg=e.message.includes('API')?e.message:'API error: '+e;
    addMsg('jarvis','I apologize, sir, but I seem to be having trouble connecting. '+msg);
  }finally{
    sendBtn.disabled=false;
    input.focus();
  }
}

// ── speech recognition ──
function initRecognition(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){micBtn.style.display='none';return}
  const recognition=new SR();
  recognition.lang='en-US';
  recognition.continuous=true;
  recognition.interimResults=true;
  let final='',interimTimeout=null;
  recognition.onresult=e=>{
    final='';let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript+' ';
      else interim+=e.results[i][0].transcript;
    }
    if(final){
      input.value=final.trim();
      input.dispatchEvent(new Event('input'));
    }
    animateViz(Math.min(60,e.results.length*4));
    if(interimTimeout)clearTimeout(interimTimeout);
    interimTimeout=setTimeout(()=>{
      const t=final.trim()||input.value.trim();
      if(t.length>1){
        input.value=t;
        input.dispatchEvent(new Event('input'));
        stopRecording();
        send();
      }
      else stopRecording();
    },1200);
  };
  recognition.onend=()=>{
    micBtn.classList.remove('recording');
    micBtn.textContent='🎤';
    isRecording=false;
    if(state===STATE.LISTENING)setStatus(STATE.IDLE);
    animateViz(0);
    // auto-restart if always-on
    if(alwaysListening&&state!==STATE.THINKING&&state!==STATE.SPEAKING){
      setTimeout(()=>{if(alwaysListening&&!isRecording)startRecording()},300);
    }
  };
  recognition.onerror=e=>{
    if(e.error==='no-speech'&&!alwaysListening){stopRecording();return}
    if(e.error!=='no-speech')console.error('SR:',e.error);
    if(alwaysListening){setTimeout(()=>{if(alwaysListening&&!isRecording)startRecording()},500)}
    else stopRecording();
  };
}
function startRecording(){
  if(!recognition)return;
  try{
    recognition.start();
    isRecording=true;
    micBtn.classList.add('recording');
    micBtn.textContent='⏹';
    setStatus(STATE.LISTENING);
  }catch(e){console.error(e)}
}
function stopRecording(){
  if(!isRecording)return;
  try{recognition.stop()}catch(e){}
  isRecording=false;
  micBtn.classList.remove('recording');
  micBtn.textContent='🎤';
  if(state===STATE.LISTENING)setStatus(STATE.IDLE);
  animateViz(0);
}
function toggleRecording(){
  if(isRecording){stopRecording();return}
  if(!recognition)initRecognition();
  startRecording();
}

document.getElementById('alwaysListen').addEventListener('click',function(){

document.getElementById('modelSelect').addEventListener('change',saveSettings);

// ── chat persistence ──
const CHATS_KEY='jarvis_chats';
function saveMessages(){
  try{localStorage.setItem(CHATS_KEY,JSON.stringify(messages.filter(m=>m.role!=='system')))}catch(e){}
}
function loadMessages(){
  try{
    const saved=JSON.parse(localStorage.getItem(CHATS_KEY));
    if(saved&&saved.length){
      saved.forEach(m=>addMsg(m.role,m.content));
      messages.push(...saved);
    }
  }catch(e){}
}

// ── stats panel ──
let statsInterval=null;
async function fetchStats(){
  const base=getBaseUrl();
  const start=performance.now();
  try{
    const res=await fetch(base+'/health');
    const lat=Math.round(performance.now()-start);
    const data=await res.json();
    return{version:data.version||'?',latency:lat+'ms',cores:navigator.hardwareConcurrency||'?',
      mem:performance.memory?{used:Math.round(performance.memory.usedJSHeapSize/1048576),total:Math.round(performance.memory.jsHeapSizeLimit/1048576)}:null,
      online:navigator.onLine};
  }catch(e){return{version:'offline',latency:'???',cores:navigator.hardwareConcurrency||'?',mem:null,online:navigator.onLine};}
}
function renderStats(s){
  const latCls=()=>{const v=parseInt(s.latency);return v<50?'good':v<200?'warn':'bad'};
  let memoryStr = '';
  if (s.metrics) {
    memoryStr = `<div class="stat-row"><span class="stat-label">Memory</span><span class="stat-value ${['warn','bad'][(s.metrics.memory>85)]} ">${s.metrics.memory}%</span></div>` +
        `<div class="stat-row"><span class="stat-label">CPU</span><span class="stat-value ${['warn','bad'][(s.metrics.cpu>75)]} ">${s.metrics.cpu}%</span></div>` +
        `<div class="stat-row"><span class="stat-label">Network</span><span class="stat-value">${s.metrics.network}MB/s</span></div>` +
        `<div class="stat-row"><span class="stat-label">System Uptime</span><span class="stat-value">${Math.floor(s.metrics.uptime/3600)}h ${Math.floor((s.metrics.uptime%3600)/60)}m</span></div>`;
  }
  document.getElementById('statsContent').innerHTML=`
    <div class="stat-sectitle">Connection</div>
    <div class="stat-row"><span class="stat-label">Status</span><span class="stat-value ${s.version==='offline'?'bad':'good'}">${s.version==='offline'?'Offline':'Online'}</span></div>
    <div class="stat-row"><span class="stat-label">Version</span><span class="stat-value">${s.version}</span></div>
    <div class="stat-row"><span class="stat-label">Latency</span><span class="stat-value ${latCls()}">${s.latency}</span></div>
    <div class="stat-sectitle">System Metrics</div>
    <div class="stat-row"><span class="stat-label">Cores</span><span class="stat-value">${s.cores||'?'}</span></div>
    ${memoryStr}
  `;
}

async function updateStats() {
  const base=getBaseUrl();
  const connStart = performance.now();
  let connLatency = '???', connVersion = 'offline', connCores = navigator.hardwareConcurrency || '?';
  try {
    const connRes = await fetch(base+'/health');
    connLatency = Math.round(performance.now() - connStart) + 'ms';
    const connData = await connRes.json();
    connVersion = connData.version || '?';
  } catch(e) {}
  
  let metrics = null;
  try {
    const mUrl=document.getElementById('metricsUrl').value;
    if(mUrl){
      const metricsRes = await fetch(mUrl);
      metrics = await metricsRes.json();
    }
  } catch(e) {}
  
  renderStats({
    version: connVersion,
    latency: connLatency,
    cores: connCores,
    online: navigator.onLine,
    metrics
  });
}
function toggleStats(){
  const open=statsPanel.classList.toggle('open');
  settingsOverlay.classList.toggle('show',open);
  if(open){updateStats();statsInterval=setInterval(updateStats,3000)}
  else{clearInterval(statsInterval);statsInterval=null}
}

// ── file drop zone ──
(function(){
  const zone=document.getElementById('fileDropZone');
  if(!zone)return;
  const preventDefaults=['dragenter','dragover','dragleave','drop'];
  preventDefaults.forEach(e=>zone.addEventListener(e,e=>e.preventDefault()));
  zone.addEventListener('dragenter',()=>zone.classList.add('dragover'));
  zone.addEventListener('dragleave',()=>zone.classList.remove('dragover'));
  zone.addEventListener('drop',e=>{
    zone.classList.remove('dragover');
    const files=e.dataTransfer.files;
    if(!files.length)return;
    const file=files[0];
    const reader=new FileReader();
    reader.onload=()=>{
      addMsg('user',`[File: ${file.name}](${reader.result?.substring(0,100)||''})`);
      scrollChat();
    };
    reader.readAsText(file);
  });
})();
